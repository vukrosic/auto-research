version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ../parameter-golf:/parameter-golf:ro
    environment:
      - PARAMETER_GOLF_PATH=/parameter-golf
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

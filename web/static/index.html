<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Research</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a26;
            --border: #2a2a3a; --text: #e0e0e8; --text2: #8888a0;
            --accent: #6c5ce7; --accent2: #a29bfe;
            --green: #00b894; --red: #ff6b6b; --yellow: #ffd93d;
            --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
        .sidebar-logo h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-logo span { font-size: 11px; color: var(--text2); }
        .nav-item { padding: 10px 20px; cursor: pointer; color: var(--text2); font-size: 14px; display: flex; align-items: center; gap: 10px; transition: all 0.15s; }
        .nav-item:hover { background: var(--bg3); color: var(--text); }
        .nav-item.active { color: var(--accent2); background: var(--bg3); border-right: 2px solid var(--accent); }
        .nav-icon { width: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.15s; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
        .topbar h2 { font-size: 16px; font-weight: 600; }
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
        .card h3 { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .stat-card .sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid var(--border); }
        tr:hover { background: var(--bg3); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-queued { background: #2d2d3f; color: var(--text2); }
        .badge-running { background: #1a3a2a; color: var(--green); }
        .badge-completed { background: #1a2a3a; color: #74b9ff; }
        .badge-failed { background: #3a1a1a; color: var(--red); }
        .badge-upcoming { background: #2d2d3f; color: var(--text2); }
        .badge-active { background: #1a3a2a; color: var(--green); }
        .badge-idle, .badge-online { background: #1a2a3a; color: #74b9ff; }
        .badge-offline, .badge-unknown { background: #3a1a1a; color: var(--red); }
        .badge-training { background: #1a3a2a; color: var(--green); }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent2); }
        .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-danger { background: #3a1a1a; color: var(--red); border: 1px solid #4a2a2a; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 140px); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px 0; }
        .chat-msg { padding: 12px 16px; margin-bottom: 8px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .chat-msg.user { background: var(--accent); color: white; margin-left: auto; }
        .chat-msg.ai { background: var(--bg3); border: 1px solid var(--border); }
        .chat-input { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); }
        .chat-input input { flex: 1; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; }
        .chat-input input:focus { border-color: var(--accent); }
        .rank-1 { color: #ffd700; font-weight: 700; }
        .rank-2 { color: #c0c0c0; font-weight: 700; }
        .rank-3 { color: #cd7f32; font-weight: 700; }
        .metric-good { color: var(--green); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 500px; max-width: 90vw; }
        .modal h2 { font-size: 18px; margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .tier { font-size: 11px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .tier-starter { background: #2d2d3f; color: var(--text2); }
        .tier-researcher { background: #1a2a3a; color: #74b9ff; }
        .tier-pro { background: #2a1a3a; color: var(--accent2); }
        .tier-team { background: #2a2a1a; color: var(--yellow); }
        .tier-admin { background: #3a2a1a; color: var(--yellow); }
        .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
        .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
        .empty p { margin-bottom: 20px; }
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 400px; text-align: center; }
        .login-box h1 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-box p { color: var(--text2); margin-bottom: 24px; font-size: 14px; }
        .login-box .error { color: var(--red); font-size: 13px; margin-top: 8px; }
        .progress-bar { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .pricing-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; text-align: center; transition: all 0.2s; }
        .pricing-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .pricing-card.featured { border-color: var(--accent); box-shadow: 0 0 20px rgba(108,92,231,0.2); }
        .pricing-card h3 { font-size: 20px; margin-bottom: 4px; }
        .pricing-card .price { font-size: 36px; font-weight: 700; margin: 12px 0; }
        .pricing-card .price span { font-size: 16px; color: var(--text2); font-weight: 400; }
        .pricing-card ul { list-style: none; text-align: left; margin: 16px 0; }
        .pricing-card li { padding: 6px 0; font-size: 14px; color: var(--text2); }
        .pricing-card li strong { color: var(--text); }
        .nav-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 8px; }
        .nav-admin-badge { font-size: 9px; background: #3a2a1a; color: var(--yellow); border-radius: 3px; padding: 1px 4px; margin-left: auto; font-weight: 700; letter-spacing: 0.5px; }
        .chat-meta { font-size: 11px; color: var(--text2); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
        .chat-meta span { background: var(--bg2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; }
        .chat-total-cost { font-size: 12px; color: var(--text2); padding: 6px 12px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); }
        /* Markdown rendering in chat */
        .chat-msg.ai h1,.chat-msg.ai h2,.chat-msg.ai h3 { margin: 8px 0 4px; font-size: 14px; color: var(--text); }
        .chat-msg.ai p { margin: 4px 0; }
        .chat-msg.ai ul,.chat-msg.ai ol { margin: 4px 0 4px 16px; }
        .chat-msg.ai li { margin: 2px 0; }
        .chat-msg.ai code { background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 3px; font-family: monospace; font-size: 12px; }
        .chat-msg.ai pre { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
        .chat-msg.ai pre code { background: none; padding: 0; }
        .chat-msg.ai strong { color: var(--text); font-weight: 600; }
        .chat-msg.ai hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
        .chat-msg.ai table { margin: 6px 0; font-size: 13px; }
        .chat-msg.ai th { background: rgba(0,0,0,0.2); }

        /* Research page */
        .research-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .research-tab { padding: 10px 20px; cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
        .research-tab:hover { color: var(--text); }
        .research-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
        .research-tab .tab-count { font-size: 11px; background: var(--bg3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
        .doc-list { display: flex; flex-direction: column; gap: 8px; }
        .doc-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 16px; }
        .doc-card:hover { border-color: var(--accent); background: var(--bg3); }
        .doc-card .doc-id { font-size: 13px; font-weight: 700; color: var(--accent2); font-family: monospace; min-width: 50px; }
        .doc-card .doc-info { flex: 1; min-width: 0; }
        .doc-card .doc-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .doc-card .doc-date { font-size: 12px; color: var(--text2); }
        .doc-card .doc-status { flex-shrink: 0; }
        .badge-CONFIRMED { background: #1a3a2a; color: var(--green); }
        .badge-FALSIFIED { background: #3a1a1a; color: var(--red); }
        .badge-PROPOSED { background: #2d2d3f; color: var(--text2); }
        .badge-TESTING { background: #1a2a3a; color: #74b9ff; }
        .badge-INCONCLUSIVE { background: #2a2a1a; color: var(--yellow); }
        .badge-DRAFT { background: #2d2d3f; color: var(--text2); }
        .badge-REVIEW { background: #1a2a3a; color: #74b9ff; }
        .badge-PUBLISHED { background: #1a3a2a; color: var(--green); }
        .badge-ACTIVE { background: #1a3a2a; color: var(--green); }
        .badge-COMPLETE { background: #1a2a3a; color: #74b9ff; }
        .doc-viewer { display: flex; flex-direction: column; height: calc(100vh - 200px); }
        .doc-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-shrink: 0; }
        .doc-toolbar .doc-path { font-size: 12px; color: var(--text2); font-family: monospace; flex: 1; }
        .doc-editor-wrap { flex: 1; display: flex; gap: 0; min-height: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .doc-editor { flex: 1; min-width: 0; resize: none; background: var(--bg); color: var(--text); border: none; padding: 16px; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.6; outline: none; overflow-y: auto; tab-size: 4; }
        .doc-preview { flex: 1; min-width: 0; padding: 16px 24px; overflow-y: auto; background: var(--bg2); border-left: 1px solid var(--border); font-size: 14px; line-height: 1.7; }
        .doc-preview h1 { font-size: 22px; margin: 16px 0 8px; color: var(--text); }
        .doc-preview h2 { font-size: 17px; margin: 14px 0 6px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .doc-preview h3 { font-size: 14px; margin: 10px 0 4px; color: var(--accent2); }
        .doc-preview p { margin: 6px 0; color: var(--text); }
        .doc-preview ul, .doc-preview ol { margin: 4px 0 4px 20px; }
        .doc-preview li { margin: 3px 0; }
        .doc-preview code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }
        .doc-preview pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .doc-preview pre code { background: none; padding: 0; }
        .doc-preview table { border-collapse: collapse; width: 100%; margin: 8px 0; }
        .doc-preview table th { text-align: left; padding: 6px 10px; font-size: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); }
        .doc-preview table td { padding: 6px 10px; font-size: 13px; border: 1px solid var(--border); }
        .doc-preview blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 8px 0; }
        .doc-preview strong { color: var(--text); }
        .doc-preview hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
        .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .view-toggle button { padding: 4px 12px; font-size: 12px; background: var(--bg); color: var(--text2); border: none; cursor: pointer; }
        .view-toggle button.active { background: var(--accent); color: white; }

        /* Deploy page */
        .deploy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .deploy-grid { grid-template-columns: 1fr; } }
        .gpu-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
        .gpu-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .gpu-card-header h4 { font-size: 15px; font-weight: 600; }
        .gpu-card .gpu-stat { display: flex; gap: 16px; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
        .gpu-card .gpu-stat strong { color: var(--text); }
        .queue-editor { width: 100%; min-height: 200px; resize: vertical; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; outline: none; tab-size: 4; }
        .queue-editor:focus { border-color: var(--accent); }
        .queue-file-list { display: flex; flex-direction: column; gap: 6px; }
        .queue-file-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg3); border-radius: 6px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
        .queue-file-item:hover { background: var(--border); }
        .queue-file-item .qf-name { font-family: monospace; }
        .queue-file-item .qf-count { color: var(--text2); font-size: 12px; }
    </style>
    <style>
        /* Terminal styles */
        .terminal-page { display: flex; flex-direction: column; height: calc(100vh - 140px); }
        .terminal-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 0; flex-shrink: 0; align-items: flex-end; }
        .terminal-tab { padding: 8px 16px; cursor: pointer; color: var(--text2); font-size: 13px; border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; display: flex; align-items: center; gap: 8px; transition: all 0.15s; white-space: nowrap; }
        .terminal-tab:hover { background: var(--bg3); color: var(--text); }
        .terminal-tab.active { background: var(--bg2); color: var(--green); border-color: var(--border); position: relative; }
        .terminal-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: var(--bg2); }
        .terminal-tab .close-tab { font-size: 16px; line-height: 1; opacity: 0.5; cursor: pointer; padding: 0 2px; }
        .terminal-tab .close-tab:hover { opacity: 1; color: var(--red); }
        .terminal-tab .tab-status { width: 6px; height: 6px; border-radius: 50%; }
        .terminal-tab .tab-status.connected { background: var(--green); }
        .terminal-tab .tab-status.disconnected { background: var(--red); }
        .terminal-tab .tab-status.connecting { background: var(--yellow); }
        .terminal-add-tab { padding: 8px 12px; cursor: pointer; color: var(--text2); font-size: 16px; border: 1px dashed var(--border); border-bottom: none; border-radius: 8px 8px 0 0; transition: all 0.15s; }
        .terminal-add-tab:hover { background: var(--bg3); color: var(--accent2); border-color: var(--accent); }
        .terminal-body { flex: 1; background: #000; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; position: relative; overflow: hidden; }
        .terminal-body .xterm { height: 100%; }
        .terminal-picker { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg2); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        .terminal-picker h3 { margin-bottom: 16px; color: var(--text); }
        .gpu-pick-list { display: flex; flex-direction: column; gap: 8px; min-width: 300px; }
        .gpu-pick-item { padding: 12px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s; }
        .gpu-pick-item:hover { border-color: var(--accent); background: var(--bg); }
        .gpu-pick-item .gpu-pick-name { font-weight: 600; }
        .gpu-pick-item .gpu-pick-host { font-size: 12px; color: var(--text2); font-family: monospace; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-container" style="display:none;">
        <div class="login-box">
            <h1>Auto-Research</h1>
            <p>Autonomous AI Research Platform</p>
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="text" id="login-key" placeholder="API Key" style="font-family:monospace;">
            </div>
            <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="doLogin()">Sign In</button>
            <div id="login-error" class="error"></div>
            <div style="margin-top:20px;font-size:13px;color:var(--text2);">
                Don't have an account? <a href="#" onclick="showPage('pricing')" style="color:var(--accent2);">View plans</a>
            </div>
        </div>
    </div>

    <!-- App -->
    <div class="app" id="app-screen" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-logo">
                <h1>Auto-Research</h1>
                <span>Autonomous AI Research</span>
            </div>
            <div class="nav-item active" data-page="chat">
                <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span> AI Research Chat
            </div>
            <div class="nav-item" data-page="experiments">
                <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 3h6v10l3.5 7H5.5L9 13V3z"/><path d="M6.5 17.5h11"/></svg></span> Experiments
            </div>
            <div class="nav-item" data-page="research">
                <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span> Research
            </div>
            <div class="nav-item" data-page="deploy">
                <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4z"/></svg></span> Deploy
            </div>
            <div class="nav-item" data-page="fleet" id="nav-fleet" style="display:none;">
                <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="6" cy="18" r="1" fill="currentColor" stroke="none"/></svg></span> GPU Fleet <span class="nav-admin-badge">ADMIN</span>
            </div>
            <div class="nav-item" data-page="terminals" id="nav-terminals" style="display:none;">
                <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></span> Terminals <span class="nav-admin-badge">ADMIN</span>
            </div>
            <div class="nav-bottom">
                <div class="nav-item" data-page="pricing">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg></span> Pricing
                </div>
                <div class="nav-item" data-page="profile">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span> Profile
                </div>
                <div class="nav-item" data-page="admin" id="nav-admin" style="display:none;">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M17.66 7.34a6 6 0 0 1 0 8.49M6.34 7.34a6 6 0 0 0 0 8.49"/></svg></span> Admin <span class="nav-admin-badge">ADMIN</span>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="topbar">
                <h2 id="page-title">Dashboard</h2>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span class="tier" id="topbar-tier"></span>
                    <span style="font-size:14px;" id="topbar-email"></span>
                    <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
                </div>
            </div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-new-exp">
        <div class="modal">
            <h2>New Experiment</h2>
            <div class="form-group"><label>Name</label><input type="text" id="exp-name" placeholder="e.g. deeper_model_test"></div>
            <div class="form-row">
                <div class="form-group"><label>Template</label><select id="exp-template"><option value="parameter_golf">Parameter Golf</option></select></div>
                <div class="form-group"><label>Stage</label><select id="exp-stage" onchange="document.getElementById('exp-steps').value={explore:500,validate:2000,full:13780}[this.value]||500"><option value="explore">Explore (500 steps)</option><option value="validate">Validate (2000 steps)</option><option value="full">Full (13780 steps)</option></select></div>
            </div>
            <div class="form-group"><label>Steps</label><input type="number" id="exp-steps" value="500"></div>
            <div class="form-group"><label>Config Overrides (one per line: KEY=value)</label><textarea id="exp-overrides" rows="4" placeholder="MATRIX_LR=0.08&#10;NUM_LAYERS=12"></textarea></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-new-exp')">Cancel</button>
                <button class="btn btn-primary" onclick="submitExperiment()">Submit</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-add-gpu">
        <div class="modal">
            <h2>Add GPU</h2>
            <div class="form-group"><label>SSH Command (paste full command)</label><input type="text" id="gpu-ssh-cmd" placeholder="ssh -p 62132 root@proxy.us-ca-6.gpu-instance.novita.ai" style="font-family:monospace;"></div>
            <div class="form-group"><label>Password</label><input type="password" id="gpu-password"></div>
            <div class="form-group"><label>Name (optional)</label><input type="text" id="gpu-name" placeholder="e.g. novita-h100-1"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-add-gpu')">Cancel</button>
                <button class="btn btn-primary" onclick="addGPU()">Add & Test</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-new-research">
        <div class="modal">
            <h2 id="new-research-title">New Exploration</h2>
            <div class="form-group"><label>Type</label>
                <select id="research-type" onchange="onResearchTypeChange()">
                    <option value="explorations">Exploration</option>
                    <option value="hypotheses">Hypothesis</option>
                    <option value="findings">Finding</option>
                    <option value="experiment_specs">Experiment Spec</option>
                </select>
            </div>
            <div class="form-group"><label>Filename (without extension)</label><input type="text" id="research-filename" placeholder="e.g. 2026-03-22_rope_variants"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-new-research')">Cancel</button>
                <button class="btn btn-primary" onclick="createResearchDoc()">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-add-user">
        <div class="modal">
            <h2>Add User</h2>
            <div class="form-group"><label>Email</label><input type="email" id="au-email" placeholder="user@example.com"></div>
            <div class="form-group"><label>Name</label><input type="text" id="au-name" placeholder="Full name"></div>
            <div class="form-group"><label>Tier</label>
                <select id="au-tier"><option value="starter">Starter ($9/mo)</option><option value="researcher" selected>Researcher ($29/mo)</option><option value="pro">Pro ($79/mo)</option><option value="admin">Admin</option></select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-add-user')">Cancel</button>
                <button class="btn btn-primary" onclick="addUser()">Create User</button>
            </div>
        </div>
    </div>

    <script>
    const API = '';
    let currentUser = null;
    let currentPage = 'chat';

    // ---- API ----
    async function api(path, opts = {}) {
        try {
            const res = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', ...opts });
            if (res.status === 401) { showLogin(); return null; }
            const data = await res.json();
            if (!res.ok) return { _error: true, detail: data.detail || `Error ${res.status}`, status: res.status, ...data };
            return data;
        } catch (e) { console.error('API error:', e); return null; }
    }

    // ---- Auth ----
    async function checkAuth() {
        const me = await api('/auth/me');
        if (me && me.id) {
            currentUser = me;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            document.getElementById('topbar-email').textContent = me.email;
            document.getElementById('topbar-tier').textContent = me.tier.toUpperCase();
            document.getElementById('topbar-tier').className = 'tier tier-' + me.tier;
            document.getElementById('nav-admin').style.display = me.tier === 'admin' ? 'flex' : 'none';
            document.getElementById('nav-fleet').style.display = me.tier === 'admin' ? 'flex' : 'none';
            document.getElementById('nav-terminals').style.display = me.tier === 'admin' ? 'flex' : 'none';
            renderChat();
        } else {
            showLogin();
        }
    }

    function showLogin() {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app-screen').style.display = 'none';
    }

    async function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const key = document.getElementById('login-key').value.trim();
        if (!email || !key) return;
        const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, api_key: key }) });
        if (res && res.id) {
            document.getElementById('login-error').textContent = '';
            checkAuth();
        } else {
            document.getElementById('login-error').textContent = res?.detail || 'Login failed';
        }
    }

    async function doLogout() {
        await api('/auth/logout', { method: 'POST' });
        currentUser = null;
        showLogin();
    }

    // ---- Navigation ----
    document.querySelectorAll('.nav-item[data-page]').forEach(el => {
        el.addEventListener('click', () => {
            if (experimentsPoll) { clearTimeout(experimentsPoll); experimentsPoll = null; }
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            const page = el.dataset.page;
            currentPage = page;
            const titles = { chat: 'AI Research Chat', experiments: 'Experiments', research: 'Research', deploy: 'Deploy', fleet: 'GPU Fleet', terminals: 'Terminals', pricing: 'Pricing', profile: 'Profile', admin: 'Admin' };
            document.getElementById('page-title').textContent = titles[page] || page;
            const r = { experiments: renderExperiments, research: renderResearch, deploy: renderDeploy, chat: renderChat, fleet: renderFleet, terminals: renderTerminals, pricing: renderPricing, profile: renderProfile, admin: renderAdmin };
            (r[page] || renderChat)();
        });
    });

    function showPage(page) {
        const el = document.querySelector(`.nav-item[data-page="${page}"]`);
        if (el) el.click();
    }

    // ---- Experiments (unified: stats + filters + paginated table) ----
    let expFilter = { status: 'all', stage: 'all', search: '', sort: 'newest', page: 0 };
    const EXP_PER_PAGE = 25;
    let experimentsPoll = null;

    async function renderExperiments() {
        if (experimentsPoll) clearInterval(experimentsPoll);
        const exps = await api('/experiments/') || [];
        const running = exps.filter(e => e.status === 'running').length;
        const queued = exps.filter(e => e.status === 'queued').length;
        const completed = exps.filter(e => e.status === 'completed').length;
        const best = exps.filter(e => e.val_bpb).sort((a,b) => a.val_bpb - b.val_bpb)[0];

        // Apply filters
        let filtered = exps;
        if (expFilter.status !== 'all') filtered = filtered.filter(e => e.status === expFilter.status);
        if (expFilter.stage !== 'all') filtered = filtered.filter(e => e.stage === expFilter.stage);
        if (expFilter.search) {
            const q = expFilter.search.toLowerCase();
            filtered = filtered.filter(e => e.name.toLowerCase().includes(q));
        }

        // Sort
        if (expFilter.sort === 'bpb') filtered.sort((a,b) => (a.val_bpb||99) - (b.val_bpb||99));
        else if (expFilter.sort === 'newest') filtered.sort((a,b) => new Date(b.completed_at || b.started_at || b.queued_at || 0) - new Date(a.completed_at || a.started_at || a.queued_at || 0));
        else if (expFilter.sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (expFilter.sort === 'steps') filtered.sort((a,b) => (b.steps||0) - (a.steps||0));

        // Paginate
        const totalPages = Math.max(1, Math.ceil(filtered.length / EXP_PER_PAGE));
        if (expFilter.page >= totalPages) expFilter.page = totalPages - 1;
        const pageExps = filtered.slice(expFilter.page * EXP_PER_PAGE, (expFilter.page + 1) * EXP_PER_PAGE);

        // Compute rank for bpb-sorted view
        const bpbSorted = expFilter.sort === 'bpb';

        document.getElementById('content').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="label">Running</div><div class="value" style="color:var(--green)">${running}</div><div class="sub">experiments active</div></div>
                <div class="stat-card"><div class="label">Queued</div><div class="value">${queued}</div><div class="sub">waiting for GPU</div></div>
                <div class="stat-card"><div class="label">Completed</div><div class="value" style="color:var(--accent2)">${completed}</div><div class="sub">total experiments</div></div>
                <div class="stat-card"><div class="label">Best val_bpb</div><div class="value metric-good">${best ? best.val_bpb.toFixed(4) : '---'}</div><div class="sub">${best ? best.name : 'no results yet'}</div></div>
            </div>
            <div class="card">
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;">
                    <input type="text" placeholder="Search by name..." value="${escHtml(expFilter.search)}" oninput="expFilter.search=this.value;expFilter.page=0;renderExperiments()" style="padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;width:200px;outline:none;">
                    <select onchange="expFilter.status=this.value;expFilter.page=0;renderExperiments()" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;">
                        <option value="all" ${expFilter.status==='all'?'selected':''}>All status</option>
                        <option value="completed" ${expFilter.status==='completed'?'selected':''}>Completed</option>
                        <option value="running" ${expFilter.status==='running'?'selected':''}>Running</option>
                        <option value="queued" ${expFilter.status==='queued'?'selected':''}>Queued</option>
                        <option value="failed" ${expFilter.status==='failed'?'selected':''}>Failed</option>
                    </select>
                    <select onchange="expFilter.stage=this.value;expFilter.page=0;renderExperiments()" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;">
                        <option value="all" ${expFilter.stage==='all'?'selected':''}>All stages</option>
                        <option value="explore" ${expFilter.stage==='explore'?'selected':''}>Explore</option>
                        <option value="validate" ${expFilter.stage==='validate'?'selected':''}>Validate</option>
                        <option value="full" ${expFilter.stage==='full'?'selected':''}>Full</option>
                    </select>
                    <select onchange="expFilter.sort=this.value;expFilter.page=0;renderExperiments()" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;">
                        <option value="newest" ${expFilter.sort==='newest'?'selected':''}>Sort: Newest</option>
                        <option value="bpb" ${expFilter.sort==='bpb'?'selected':''}>Sort: Best BPB</option>
                        <option value="name" ${expFilter.sort==='name'?'selected':''}>Sort: Name</option>
                        <option value="steps" ${expFilter.sort==='steps'?'selected':''}>Sort: Steps</option>
                    </select>
                    <span style="color:var(--text2);font-size:12px;margin-left:auto;">${filtered.length} experiments</span>
                    <button class="btn btn-primary btn-sm" onclick="openModal('modal-new-exp')">+ New</button>
                </div>
                ${pageExps.length ? `<div style="overflow-x:auto;"><table><tr>${bpbSorted?'<th>Rank</th>':''}<th>Name</th><th>Stage</th><th>Status</th><th>Steps</th><th>val_bpb</th><th>Submitted</th><th></th></tr>
                ${pageExps.map((e,i) => {
                    const rank = expFilter.page * EXP_PER_PAGE + i + 1;
                    const currentStep = e.current_step || 0;
                    const totalSteps = e.steps || 0;
                    const pct = totalSteps > 0 ? Math.max(0, Math.min(100, Math.round((currentStep / totalSteps) * 100))) : 0;
                    return `<tr>${bpbSorted?`<td class="${rank<=3?'rank-'+rank:''}">#${rank}</td>`:''}` +
                    `<td><strong>${escHtml(e.name)}</strong></td><td>${e.stage}</td><td><span class="badge badge-${e.status}">${e.status}</span></td>` +
                    `<td><div>${currentStep}/${totalSteps}</div><div class="progress-bar" style="margin-top:6px;"><div class="progress-fill" style="width:${pct}%;"></div></div></td>` +
                    `<td class="${e.val_bpb?'metric-good':''}" style="${e.val_bpb?'font-weight:600':''}">${e.val_bpb?e.val_bpb.toFixed(4):'---'}</td>` +
                    `<td style="color:var(--text2);font-size:12px;">${timeAgo(e.queued_at)}</td>` +
                    `<td style="display:flex;gap:6px;flex-wrap:wrap;">` +
                    `${e.status==='queued'?`<button class="btn btn-primary btn-sm" onclick="startExp(${e.id})">Run now</button>`:''}` +
                    `${['queued','running'].includes(e.status)?`<button class="btn btn-secondary btn-sm" onclick="refreshExp(${e.id})">Refresh</button>`:''}` +
                    `${['queued','running'].includes(e.status)?`<button class="btn btn-secondary btn-sm" onclick="cancelExp(${e.id})">Cancel</button>`:''}` +
                    `</td></tr>`;
                }).join('')}</table></div>` :
                `<div class="empty"><h3>No matching experiments</h3><p>Try adjusting your filters</p></div>`}
                ${totalPages > 1 ? `<div style="display:flex;justify-content:center;align-items:center;gap:12px;padding:16px 0;">
                    <button class="btn btn-secondary btn-sm" onclick="expFilter.page--;renderExperiments()" ${expFilter.page===0?'disabled':''}>Prev</button>
                    <span style="color:var(--text2);font-size:13px;">Page ${expFilter.page+1} of ${totalPages}</span>
                    <button class="btn btn-secondary btn-sm" onclick="expFilter.page++;renderExperiments()" ${expFilter.page>=totalPages-1?'disabled':''}>Next</button>
                </div>` : ''}
            </div>`;

        if (currentPage === 'experiments') {
            experimentsPoll = setTimeout(() => {
                if (currentPage === 'experiments') renderExperiments();
            }, running > 0 ? 3000 : 10000);
        }
    }

    // ---- Chat ----
    // Chat state
    let chatMsgs = [];
    let chatTotalCost = 0;
    let chatLoaded = false;

    function mdToHtml(text) {
        if (typeof marked === 'undefined') return escHtml(text);
        try { return marked.parse(text, {breaks: true}); } catch(e) { return escHtml(text); }
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function fmtCost(usd) {
        if (!usd || usd === 0) return '$0.000000';
        if (usd < 0.0001) return `$${usd.toFixed(8)}`;
        return `$${usd.toFixed(6)}`;
    }

    function buildChatMeta(m) {
        if (currentUser?.tier !== 'admin' || m.role !== 'ai' || !m.usage) return '';
        const u = m.usage;
        return `<div class="chat-meta">
            <span>⏱ ${u.latency_ms}ms</span>
            <span>↑ ${u.input_tokens} in${u.cache_read_tokens ? ` (${u.cache_read_tokens} cached)` : ''}</span>
            <span>↓ ${u.output_tokens} out</span>
            <span>💰 ${fmtCost(u.cost_usd)}</span>
        </div>`;
    }

    function renderChatMessages() {
        const el = document.getElementById('chat-messages');
        if (!el) return;
        el.innerHTML = chatMsgs.map(m => `
            <div class="chat-msg ${m.role}">
                ${m.role === 'ai' ? mdToHtml(m.text) : escHtml(m.text)}
                ${buildChatMeta(m)}
            </div>`).join('');
        el.scrollTop = el.scrollHeight;
    }

    async function renderChat() {
        // Load history from DB on first render
        if (!chatLoaded) {
            chatLoaded = true;
            chatMsgs = [];
            chatTotalCost = 0;
            const history = await api('/chat/history') || [];
            if (history.length === 0) {
                chatMsgs = [{ role:'ai', text:'Hi! I\'m your AI research assistant. Ask me anything about ML experiments, model architecture, results, or what to try next.' }];
            } else {
                for (const m of history) {
                    const entry = { role: m.role === 'assistant' ? 'ai' : 'user', text: m.content };
                    if (m.role === 'assistant' && m.cost_usd) {
                        entry.usage = { input_tokens: m.input_tokens, cache_read_tokens: m.cache_read_tokens, output_tokens: m.output_tokens, cost_usd: m.cost_usd, latency_ms: m.latency_ms };
                        chatTotalCost += m.cost_usd;
                    }
                    chatMsgs.push(entry);
                }
            }
        }

        const isAdmin = currentUser?.tier === 'admin';
        document.getElementById('content').innerHTML = `
            <div class="chat-container">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <span style="font-size:13px;color:var(--text2);">AI Research Assistant</span>
                    <div style="display:flex;gap:8px;align-items:center;">
                        ${isAdmin ? `<span class="chat-total-cost">Total: ${fmtCost(chatTotalCost)}</span>` : ''}
                        <button class="btn btn-secondary btn-sm" onclick="clearChat()">Clear</button>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Ask about experiments, architecture ideas, results..." onkeydown="if(event.key==='Enter')sendChat()">
                    <button class="btn btn-primary" onclick="sendChat()">Send</button>
                </div>
            </div>`;
        renderChatMessages();
    }

    async function sendChat() {
        const input = document.getElementById('chat-input');
        const msg = input.value.trim(); if (!msg) return;
        chatMsgs.push({role:'user', text:msg}); input.value='';
        renderChatMessages();
        // Disable input while waiting
        input.disabled = true;
        const res = await api('/chat/', {method:'POST', body:JSON.stringify({message:msg, history:[]})});
        input.disabled = false; input.focus();
        if (res) {
            const entry = { role:'ai', text: res.response || 'Error reaching AI' };
            if (res.usage) {
                entry.usage = res.usage;
                chatTotalCost += res.usage.cost_usd || 0;
                // Update total cost display (admin only)
                const costEl = document.querySelector('.chat-total-cost');
                if (costEl) costEl.textContent = `Total: ${fmtCost(chatTotalCost)}`;
            }
            chatMsgs.push(entry);
        } else {
            chatMsgs.push({role:'ai', text:'Error reaching AI'});
        }
        renderChatMessages();
    }

    async function clearChat() {
        if (!confirm('Clear chat history?')) return;
        await api('/chat/history', {method:'DELETE'});
        chatMsgs = [{ role:'ai', text:'Chat cleared. How can I help with your research?' }];
        chatTotalCost = 0;
        chatLoaded = true;
        renderChat();
    }

    // ---- Fleet ----
    async function renderFleet() {
        const gpus = await api('/fleet/') || [];
        document.getElementById('content').innerHTML = `
            <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                <span style="color:var(--text2)">${gpus.length} GPUs</span>
                <button class="btn btn-primary" onclick="openModal('modal-add-gpu')">+ Add GPU</button>
            </div>
            ${gpus.length ? `<div class="stats-grid">${gpus.map(g => `
                <div class="stat-card">
                    <div style="display:flex;justify-content:space-between"><div><div class="label">${g.name}</div><div style="font-size:12px;color:var(--text2);margin-top:2px;">${g.host}:${g.port}</div></div><span class="badge badge-${g.status}">${g.status}</span></div>
                    <div style="margin-top:12px;display:flex;gap:16px;font-size:13px;">
                        ${g.gpu_utilization!=null?`<span>GPU: <strong>${g.gpu_utilization}%</strong></span>`:''}
                        ${g.gpu_temp!=null?`<span>Temp: <strong>${g.gpu_temp}C</strong></span>`:''}
                        ${g.current_experiment?`<span>Exp: <strong>${g.current_experiment}</strong></span>`:''}
                    </div>
                    <div style="margin-top:12px;display:flex;gap:6px;">
                        <button class="btn btn-secondary btn-sm" onclick="testGPU(${g.id})">Test</button>
                        <button class="btn btn-secondary btn-sm" onclick="statusGPU(${g.id})">Status</button>
                        <button class="btn btn-secondary btn-sm" onclick="openTerminalPage(${g.id},'${g.name}')">Terminal</button>
                        <button class="btn btn-danger btn-sm" onclick="removeGPU(${g.id},'${g.name}')">Remove</button>
                    </div>
                    ${g.last_seen?`<div style="font-size:11px;color:var(--text2);margin-top:8px;">Last seen: ${timeAgo(g.last_seen)}</div>`:''}

    function openTermSession(gpuId, gpuName) {
        // Hide picker
        const picker = document.getElementById('term-gpu-picker');
        if (picker) picker.style.display = 'none';
        document.getElementById('term-empty').style.display = 'none';

        const id = termCounter++;
        const session = { id, gpuId, gpuName, term: null, ws: null, fitAddon: null, status: 'connecting' };
        termSessions.push(session);
        activeTermIdx = termSessions.length - 1;

        renderTermTabs();

        // Create terminal
        const termEl = document.createElement('div');
        termEl.id = `term-container-${id}`;
        termEl.style.cssText = 'height:100%;width:100%;';
        session.termEl = termEl;
        document.getElementById('term-body').appendChild(termEl);

        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
            theme: {
                background: '#0a0a0f',
                foreground: '#e0e0e8',
                cursor: '#a29bfe',
                selectionBackground: 'rgba(108,92,231,0.3)',
                black: '#1a1a26',
                red: '#ff6b6b',
                green: '#00b894',
                yellow: '#ffd93d',
                blue: '#74b9ff',
                magenta: '#a29bfe',
                cyan: '#81ecec',
                white: '#e0e0e8',
            },
            allowProposedApi: true,
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        try {
            const webLinksAddon = new WebLinksAddon.WebLinksAddon();
            term.loadAddon(webLinksAddon);
        } catch(e) {}

        term.open(termEl);
        fitAddon.fit();
        session.term = term;
        session.fitAddon = fitAddon;

        // Connect WebSocket — pass api_key as token since WS doesn't reliably send cookies
        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const apiKey = currentUser?.api_key || '';
        const ws = new WebSocket(`${wsProto}//${location.host}/terminal/ws/${gpuId}?token=${apiKey}`);
        session.ws = ws;

        ws.onopen = () => {
            session.status = 'connected';
            renderTermTabs();
            // Send initial resize
            ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        };

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'output') {
                term.write(msg.data);
            } else if (msg.type === 'error') {
                term.write(`\r\n\x1b[31m${msg.data}\x1b[0m\r\n`);
                session.status = 'disconnected';
                renderTermTabs();
            }
        };

        ws.onclose = () => {
            session.status = 'disconnected';
            term.write('\r\n\x1b[33m[Connection closed]\x1b[0m\r\n');
            renderTermTabs();
        };

        ws.onerror = () => {
            session.status = 'disconnected';
            renderTermTabs();
        };

        // Send keystrokes to SSH
        term.onData((data) => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data }));
            }
        });

        // Handle resize
        term.onResize(({ cols, rows }) => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'resize', cols, rows }));
            }
        });

        showTermSession(activeTermIdx);

        // Fit on window resize
        const resizeHandler = () => {
            if (termSessions[activeTermIdx]?.id === id) {
                fitAddon.fit();
            }
        };
        window.addEventListener('resize', resizeHandler);
        session._resizeHandler = resizeHandler;
    }

    function renderTermTabs() {
        const tabsEl = document.getElementById('term-tabs');
        if (!tabsEl) return;
        tabsEl.innerHTML = termSessions.map((s, i) => `
            <div class="terminal-tab ${i === activeTermIdx ? 'active' : ''}" onclick="showTermSession(${i})">
                <span class="tab-status ${s.status}"></span>
                ${s.gpuName}
                <span class="close-tab" onclick="event.stopPropagation();closeTermSession(${i})">&times;</span>
            </div>`).join('') +
            `<div class="terminal-add-tab" onclick="showGPUPicker()" title="New terminal">+</div>`;
    }

    function showTermSession(idx) {
        activeTermIdx = idx;
        // Hide all term containers
        termSessions.forEach(s => { if (s.termEl) s.termEl.style.display = 'none'; });
        const session = termSessions[idx];
        if (!session) return;
        if (session.termEl) {
            session.termEl.style.display = 'block';
            if (session.fitAddon) {
                setTimeout(() => { session.fitAddon.fit(); session.term.focus(); }, 10);
            }
        }
        renderTermTabs();
    }

    function closeTermSession(idx) {
        const session = termSessions[idx];
        if (!session) return;
        // Clean up
        if (session.ws && session.ws.readyState === WebSocket.OPEN) session.ws.close();
        if (session.term) session.term.dispose();
        if (session._resizeHandler) window.removeEventListener('resize', session._resizeHandler);
        if (session.termEl) session.termEl.remove();

        termSessions.splice(idx, 1);

        if (termSessions.length === 0) {
            activeTermIdx = -1;
            const empty = document.getElementById('term-empty');
            if (empty) empty.style.display = 'flex';
        } else {
            activeTermIdx = Math.min(idx, termSessions.length - 1);
            showTermSession(activeTermIdx);
        }
        renderTermTabs();
    }

    // ---- Deploy ----
    let deployQueueDirty = false;

    async function renderDeploy() {
        const [queue, gpus, files, plans] = await Promise.all([
            api('/queues/active'),
            api('/fleet/').catch(() => []),
            api('/queues/files'),
            api('/queues/plans'),
        ]);

        const gpuList = Array.isArray(gpus) ? gpus : [];
        const queueData = queue || { entries: [], raw: '', count: 0 };
        const queueFiles = files || [];
        const wavePlans = plans || [];

        document.getElementById('content').innerHTML = `
            <div class="deploy-grid">
                <div>
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                            <h3>Active Queue</h3>
                            <div style="display:flex;gap:6px;">
                                <button class="btn btn-primary btn-sm" id="queue-save-btn" onclick="saveQueue()" style="opacity:0.4;" disabled>Save</button>
                            </div>
                        </div>
                        <textarea class="queue-editor" id="queue-editor" oninput="onQueueEdit()" spellcheck="false" placeholder="# name steps [ENV=val ...]\nmy_experiment 500 MATRIX_LR=0.08">${escHtml(queueData.raw)}</textarea>
                        <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;">
                            <span style="font-size:12px;color:var(--text2);">${queueData.count} experiment${queueData.count!==1?'s':''} in queue</span>
                            <span style="font-size:11px;color:var(--text2);font-family:monospace;">queues/active.txt</span>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Queue Files</h3>
                        <div class="queue-file-list" style="margin-top:10px;">
                            ${queueFiles.map(f => `<div class="queue-file-item" onclick="loadQueueFile('${escHtml(f.filename)}')">
                                <span class="qf-name">${f.active ? '<strong>' : ''}${f.filename}${f.active ? '</strong>' : ''}</span>
                                <span class="qf-count">${f.count} exp${f.count!==1?'s':''}</span>
                            </div>`).join('')}
                            ${!queueFiles.length ? '<div style="color:var(--text2);font-size:13px;padding:8px;">No queue files</div>' : ''}
                        </div>
                    </div>
                    ${wavePlans.length ? `<div class="card">
                        <h3>Wave Plans</h3>
                        <div class="queue-file-list" style="margin-top:10px;">
                            ${wavePlans.map(p => `<div class="queue-file-item" onclick="viewWavePlan('${escHtml(p.filename)}')">
                                <span class="qf-name">${escHtml(p.title)}</span>
                                <span class="qf-count">${p.filename}</span>
                            </div>`).join('')}
                        </div>
                    </div>` : ''}
                </div>
                <div>
                    <div class="card">
                        <h3>GPU Fleet</h3>
                        ${gpuList.length ? gpuList.map(g => `<div class="gpu-card" style="margin-top:10px;">
                            <div class="gpu-card-header">
                                <h4>${escHtml(g.name)}</h4>
                                <span class="badge badge-${g.status}">${g.status}</span>
                            </div>
                            <div class="gpu-stat">
                                <span>Util: <strong>${g.gpu_utilization != null ? g.gpu_utilization + '%' : '?'}</strong></span>
                                <span>Temp: <strong>${g.gpu_temp != null ? g.gpu_temp + 'C' : '?'}</strong></span>
                                <span>Rate: <strong>$${(g.hourly_rate||0).toFixed(2)}/hr</strong></span>
                            </div>
                            ${g.current_experiment ? `<div style="font-size:13px;margin-top:4px;">Running: <strong style="color:var(--green);">${escHtml(g.current_experiment)}</strong> ${g.current_step ? `(step ${g.current_step})` : ''}</div>` : ''}
                            <div style="margin-top:8px;display:flex;gap:6px;">
                                <button class="btn btn-secondary btn-sm" onclick="refreshGPU(${g.id})">Refresh</button>
                                ${g.status==='training'?`<button class="btn btn-danger btn-sm" onclick="killGPUExp(${g.id},'${escHtml(g.name)}')">Kill</button>`:''}
                            </div>
                        </div>`).join('') : '<div style="color:var(--text2);padding:12px;">No GPUs registered. Add via GPU Fleet tab.</div>'}
                    </div>
                    <div id="deploy-detail" style="margin-top:16px;"></div>
                </div>
            </div>`;
        deployQueueDirty = false;
    }

    function onQueueEdit() {
        deployQueueDirty = true;
        const btn = document.getElementById('queue-save-btn');
        if (btn) { btn.style.opacity = '1'; btn.disabled = false; }
    }

    async function saveQueue() {
        const editor = document.getElementById('queue-editor');
        if (!editor) return;
        const result = await api('/queues/active', {
            method: 'PUT',
            body: JSON.stringify({ content: editor.value }),
        });
        if (result && result.ok) {
            deployQueueDirty = false;
            const btn = document.getElementById('queue-save-btn');
            if (btn) { btn.style.opacity = '0.4'; btn.disabled = true; btn.textContent = 'Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
        }
    }

    async function loadQueueFile(filename) {
        const data = await api(`/queues/file/${filename}`);
        if (!data) return;
        const detail = document.getElementById('deploy-detail');
        if (detail) {
            detail.innerHTML = `<div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <h3>${escHtml(filename)}</h3>
                    <button class="btn btn-secondary btn-sm" onclick="copyQueueToActive('${escHtml(filename)}')">Copy to Active</button>
                </div>
                <pre style="background:var(--bg);padding:12px;border-radius:8px;font-size:13px;overflow-x:auto;max-height:300px;overflow-y:auto;">${escHtml(data.raw)}</pre>
                <div style="font-size:12px;color:var(--text2);margin-top:6px;">${data.entries.length} experiments</div>
            </div>`;
        }
    }

    async function copyQueueToActive(filename) {
        const data = await api(`/queues/file/${filename}`);
        if (!data) return;
        const editor = document.getElementById('queue-editor');
        if (editor) {
            editor.value = data.raw;
            onQueueEdit();
        }
    }

    async function viewWavePlan(filename) {
        const data = await api(`/queues/plan/${filename}`);
        if (!data) return;
        const detail = document.getElementById('deploy-detail');
        if (detail) {
            const html = typeof marked !== 'undefined' ? marked.parse(data.content, {breaks: true}) : escHtml(data.content);
            detail.innerHTML = `<div class="card"><div class="doc-preview" style="max-height:500px;overflow-y:auto;">${html}</div></div>`;
        }
    }

    async function refreshGPU(gpuId) {
        await api(`/fleet/${gpuId}/status`, {method: 'POST'});
        renderDeploy();
    }

    async function killGPUExp(gpuId, gpuName) {
        if (!confirm(`Kill running experiment on ${gpuName}?`)) return;
        await api(`/fleet/${gpuId}/exec`, {method: 'POST', body: JSON.stringify({command: 'pkill -f train_gpt || true'})});
        renderDeploy();
    }

    // ---- Research ----
    let researchTab = 'findings';
    let researchData = {};
    let currentDoc = null;
    let docViewMode = 'split'; // 'edit', 'preview', 'split'
    let docDirty = false;

    async function renderResearch() {
        const [docs, specs, exps] = await Promise.all([api('/research/'), api('/specs/'), api('/experiments/')]);
        researchData = docs && !docs._error && typeof docs === 'object' ? docs : {};
        researchData.experiment_specs = Array.isArray(specs) ? specs : [];
        researchData.experiments = Array.isArray(exps) ? exps : [];
        const findings = researchData.findings || [];
        const hypotheses = researchData.hypotheses || [];
        const explorations = researchData.explorations || [];
        const experimentSpecs = researchData.experiment_specs || [];
        const experiments = researchData.experiments || [];
        const activeSpecs = experimentSpecs.filter(s => ['queued','running'].includes(s.latest_run?.status || '') || s.desired_state === 'queued').length;
        const running = experiments.filter(e => e.status === 'running').length;
        const best = experiments.filter(e => e.val_bpb).sort((a,b) => a.val_bpb - b.val_bpb)[0];

        document.getElementById('content').innerHTML = `
            ${(docs && docs._error) || (specs && specs._error) ? `<div class="card" style="border-color:var(--red);"><h3>Research API Warning</h3><p style="color:var(--text2);font-size:14px;">The backend routes for research/specs are unavailable. Restart the API server to load the latest routes.</p></div>` : ''}
            <div class="stats-grid">
                <div class="stat-card"><div class="label">Experiment Specs</div><div class="value">${experimentSpecs.length}</div><div class="sub">${activeSpecs} active or queued</div></div>
                <div class="stat-card"><div class="label">Hypotheses</div><div class="value">${hypotheses.length}</div><div class="sub">${findings.length} findings published</div></div>
                <div class="stat-card"><div class="label">Explorations</div><div class="value">${explorations.length}</div><div class="sub">recent probes and notes</div></div>
                <div class="stat-card"><div class="label">Live Runs</div><div class="value" style="color:var(--green)">${running}</div><div class="sub">${best ? `best ${best.val_bpb.toFixed(4)} by ${best.name}` : 'no completed metrics yet'}</div></div>
            </div>
            <div class="research-tabs">
                <div class="research-tab ${researchTab==='experiment_specs'?'active':''}" onclick="researchTab='experiment_specs';renderResearchList()">
                    Experiment Specs <span class="tab-count">${experimentSpecs.length}</span>
                </div>
                <div class="research-tab ${researchTab==='findings'?'active':''}" onclick="researchTab='findings';renderResearchList()">
                    Findings <span class="tab-count">${findings.length}</span>
                </div>
                <div class="research-tab ${researchTab==='hypotheses'?'active':''}" onclick="researchTab='hypotheses';renderResearchList()">
                    Hypotheses <span class="tab-count">${hypotheses.length}</span>
                </div>
                <div class="research-tab ${researchTab==='explorations'?'active':''}" onclick="researchTab='explorations';renderResearchList()">
                    Explorations <span class="tab-count">${explorations.length}</span>
                </div>
                <div style="flex:1"></div>
                <button class="btn btn-primary btn-sm" style="align-self:center;" onclick="openNewResearch()">+ New</button>
            </div>
            <div id="research-content"></div>`;
        renderResearchList();
    }

    function renderResearchList() {
        // Update active tab styling
        document.querySelectorAll('.research-tab').forEach((el, i) => {
            const tabs = ['experiment_specs', 'findings', 'hypotheses', 'explorations'];
            el.classList.toggle('active', tabs[i] === researchTab);
        });

        const docs = researchData[researchTab] || [];
        const container = document.getElementById('research-content');

        if (!docs.length) {
            const emptyLabel = researchTab === 'experiment_specs' ? 'experiment specs' : researchTab;
            const singular = researchTab === 'experiment_specs' ? 'experiment spec' : researchTab.slice(0,-1);
            container.innerHTML = `<div class="empty"><h3>No ${emptyLabel} yet</h3><p>Create your first ${singular} to get started</p>
                <button class="btn btn-primary" onclick="openNewResearch()">+ New ${singular}</button></div>`;
            return;
        }

        if (researchTab === 'experiment_specs') {
            const sortedSpecs = [...docs].sort((a, b) => {
                const aTime = new Date(a.latest_run?.queued_at || a.updated_at || 0);
                const bTime = new Date(b.latest_run?.queued_at || b.updated_at || 0);
                return bTime - aTime;
            });
            container.innerHTML = `<div class="doc-list">${sortedSpecs.map(d => `
                <div class="doc-card" onclick="openResearchDoc('experiment_specs', ${d.id})">
                    <div class="doc-id">${escHtml((d.spec_type || '').toUpperCase())}</div>
                    <div class="doc-info">
                        <div class="doc-title">${escHtml(d.name)}</div>
                        <div class="doc-date">${escHtml(d.stage)} · ${escHtml(d.slug)} · ${d.steps} steps · ${d.linked_docs?.length || 0} links</div>
                    </div>
                    <div class="doc-status" style="text-align:right;">
                        ${d.latest_run ? `<span class="badge badge-${d.latest_run.status}">${d.latest_run.status}</span>` : `<span class="badge">${escHtml(d.desired_state || 'draft')}</span>`}
                        <div style="font-size:11px;color:var(--text2);margin-top:6px;">${d.latest_run?.val_bpb ? `best ${d.latest_run.val_bpb.toFixed(4)}` : 'no run metrics yet'}</div>
                    </div>
                </div>`).join('')}</div>`;
            return;
        }

        // Sort: findings/hypotheses by ID (filename), explorations by date desc
        const sorted = [...docs].sort((a, b) => {
            if (researchTab === 'explorations') return (b.date || '').localeCompare(a.date || '');
            return a.filename.localeCompare(b.filename);
        });

        container.innerHTML = `<div class="doc-list">${sorted.map(d => {
            const id = d.slug.match(/^[HF]\d+/) ? d.slug.match(/^[HF]\d+/)[0] : '';
            const experimentsCount = Array.isArray(d.meta?.experiments) ? d.meta.experiments.length : 0;
            const origin = d.meta?.origin || d.meta?.finding || d.meta?.leads_to || '';
            return `<div class="doc-card" onclick="openResearchDoc('${d.type}','${d.slug}')">
                <div class="doc-id">${id}</div>
                <div class="doc-info">
                    <div class="doc-title">${escHtml(d.title)}</div>
                    <div class="doc-date">${d.date || ''} &middot; ${d.filename}${experimentsCount ? ` · ${experimentsCount} experiments` : ''}${origin ? ` · ${escHtml(origin)}` : ''}</div>
                </div>
                <div class="doc-status"><span class="badge badge-${d.status}">${d.status}</span></div>
            </div>`;
        }).join('')}</div>`;
    }

    async function openResearchDoc(type, slug) {
        const doc = type === 'experiment_specs' ? await api(`/specs/${slug}`) : await api(`/research/${type}/${slug}`);
        if (!doc) return;
        currentDoc = {...doc, type, kind: type === 'experiment_specs' ? 'spec' : 'doc'};
        docDirty = false;
        if (currentDoc.kind === 'spec') docViewMode = 'edit';

        const container = document.getElementById('content');
        container.innerHTML = `
            <div class="doc-viewer">
                <div class="doc-toolbar">
                    <button class="btn btn-secondary btn-sm" onclick="backToResearchList()">&larr; Back</button>
                    <span class="doc-path">${type}/${doc.filename || doc.slug}</span>
                    <span class="badge ${doc.status ? `badge-${doc.status}` : ''}" style="font-size:12px;">${doc.status || doc.desired_state || ''}</span>
                    <div class="view-toggle">
                        <button class="${docViewMode==='edit'?'active':''}" onclick="setDocView('edit')">Edit</button>
                        <button class="${docViewMode==='split'?'active':''}" onclick="setDocView('split')">Split</button>
                        <button class="${docViewMode==='preview'?'active':''}" onclick="setDocView('preview')">Preview</button>
                    </div>
                    ${currentDoc.kind === 'spec' ? `<button class="btn btn-secondary btn-sm" onclick="queueCurrentSpec()">Queue Run</button>` : ''}
                    <button class="btn btn-primary btn-sm" id="doc-save-btn" onclick="saveDoc()" style="opacity:0.4;" disabled>Save</button>
                    ${currentDoc.kind === 'doc' ? `<button class="btn btn-danger btn-sm" onclick="confirmDeleteDoc()">Delete</button>` : ''}
                </div>
                <div class="doc-editor-wrap" id="doc-editor-wrap">
                    <textarea class="doc-editor" id="doc-editor" oninput="onDocEdit()" spellcheck="false">${escHtml(doc.content)}</textarea>
                    <div class="doc-preview" id="doc-preview"></div>
                </div>
            </div>`;
        applyDocViewMode();
        updateDocPreview();
    }

    function setDocView(mode) {
        if (currentDoc?.kind === 'spec' && mode === 'split') mode = 'preview';
        docViewMode = mode;
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        const labels = {'edit': 0, 'split': 1, 'preview': 2};
        document.querySelectorAll('.view-toggle button')[labels[mode]]?.classList.add('active');
        applyDocViewMode();
    }

    function applyDocViewMode() {
        const editor = document.getElementById('doc-editor');
        const preview = document.getElementById('doc-preview');
        if (!editor || !preview) return;
        if (currentDoc?.kind === 'spec' && docViewMode === 'split') docViewMode = 'preview';
        if (docViewMode === 'edit') { editor.style.display='block'; preview.style.display='none'; editor.style.flex='1'; }
        else if (docViewMode === 'preview') { editor.style.display='none'; preview.style.display='block'; preview.style.flex='1'; preview.style.borderLeft='none'; }
        else { editor.style.display='block'; preview.style.display='block'; editor.style.flex='1'; preview.style.flex='1'; preview.style.borderLeft='1px solid var(--border)'; }
    }

    function onDocEdit() {
        docDirty = true;
        const btn = document.getElementById('doc-save-btn');
        if (btn) { btn.style.opacity = '1'; btn.disabled = false; }
        updateDocPreview();
    }

    function updateDocPreview() {
        const editor = document.getElementById('doc-editor');
        const preview = document.getElementById('doc-preview');
        if (!editor || !preview) return;
        let text = editor.value;
        if (currentDoc?.kind === 'spec') {
            preview.innerHTML = `<pre style="white-space:pre-wrap;font-size:13px;margin:0;">${escHtml(text)}</pre>`;
            return;
        }
        // Strip frontmatter for preview
        text = text.replace(/^---\s*\n[\s\S]*?\n---\s*\n/, '');
        preview.innerHTML = typeof marked !== 'undefined' ? marked.parse(text, {breaks: true}) : escHtml(text);
    }

    async function saveDoc() {
        if (!currentDoc || !docDirty) return;
        const editor = document.getElementById('doc-editor');
        const route = currentDoc.kind === 'spec' ? `/specs/${currentDoc.id}` : `/research/${currentDoc.type}/${currentDoc.slug}`;
        const result = await api(route, { method: 'PUT', body: JSON.stringify({ content: editor.value }) });
        if (result && result.ok) {
            docDirty = false;
            const btn = document.getElementById('doc-save-btn');
            if (btn) { btn.style.opacity = '0.4'; btn.disabled = true; btn.textContent = 'Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
        }
    }

    function backToResearchList() {
        if (docDirty && !confirm('You have unsaved changes. Discard?')) return;
        currentDoc = null;
        renderResearch();
    }

    function confirmDeleteDoc() {
        if (!currentDoc || currentDoc.kind !== 'doc') return;
        if (!confirm(`Delete ${currentDoc.type}/${currentDoc.filename}? This cannot be undone.`)) return;
        api(`/research/${currentDoc.type}/${currentDoc.slug}`, { method: 'DELETE' }).then(r => {
            if (r && r.ok) { currentDoc = null; renderResearch(); }
        });
    }

    function openNewResearch() {
        document.getElementById('research-type').value = researchTab;
        onResearchTypeChange();
        openModal('modal-new-research');
    }

    function onResearchTypeChange() {
        const t = document.getElementById('research-type').value;
        const titles = { explorations: 'New Exploration', hypotheses: 'New Hypothesis', findings: 'New Finding', experiment_specs: 'New Experiment Spec' };
        document.getElementById('new-research-title').textContent = titles[t] || 'New Document';
        const fn = document.getElementById('research-filename');
        if (t === 'explorations') fn.placeholder = 'e.g. 2026-03-22_rope_variants';
        else if (t === 'hypotheses') fn.placeholder = 'e.g. H005_moe_expert_count';
        else if (t === 'findings') fn.placeholder = 'e.g. F003_embedding_factorization';
        else fn.placeholder = 'e.g. rope_base_sweep_v1';
    }

    async function createResearchDoc() {
        const docType = document.getElementById('research-type').value;
        let filename = document.getElementById('research-filename').value.trim();
        if (!filename) { alert('Filename is required'); return; }

        let result = null;
        if (docType === 'experiment_specs') {
            const content = JSON.stringify({
                spec_id: filename,
                name: filename.replace(/_/g, ' '),
                spec_type: 'exploration',
                template: 'parameter_golf',
                stage: 'explore',
                steps: 500,
                config_overrides: {},
                linked_docs: [],
                tags: [],
                notes: '',
                desired_state: 'draft',
            }, null, 2);
            result = await api('/specs/', { method: 'POST', body: JSON.stringify({ filename, content }) });
        } else {
            const tmpl = await api(`/research/template/${docType}`);
            const content = tmpl ? tmpl.content : `---\ntitle: ""\nstatus: "DRAFT"\n---\n\n# ${filename}\n`;
            result = await api(`/research/${docType}`, {
                method: 'POST',
                body: JSON.stringify({ filename, content }),
            });
        }
        if (result && result.ok) {
            closeModal('modal-new-research');
            researchTab = docType;
            await renderResearch();
            openResearchDoc(docType, docType === 'experiment_specs' ? result.id : result.slug);
        } else if (result && result._error) {
            alert(result.detail || 'Failed to create document');
        }
    }

    async function queueCurrentSpec() {
        if (!currentDoc || currentDoc.kind !== 'spec') return;
        const res = await api(`/specs/${currentDoc.id}/queue`, { method: 'POST' });
        if (res?.ok) {
            alert(`Queued run ${res.experiment_id} from ${currentDoc.slug}`);
            renderResearch();
        } else if (res?.detail) {
            alert(res.detail);
        }
    }

    // Keyboard shortcut: Ctrl+S to save when in doc editor
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's' && currentDoc && docDirty) {
            e.preventDefault();
            saveDoc();
        }
    });

    // Utils
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function timeAgo(d) { if(!d)return'---'; const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }

    // Init
    checkAuth();
    </script>
</body>
